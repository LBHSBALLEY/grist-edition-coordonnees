<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Map Editor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    html, body, #map { height: 100%; margin: 0; }
  </style>
</head>
<body>
<div id="map"></div>
<script>
  let map = L.map('map').setView([48.85, 2.35], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  let marker = null;
  let currentRecord = null;  // store the full record
  let tableId = null;


  grist.ready({ requiredAccess: 'full' });

  console.log(Object.keys(grist));
  console.log(Object.keys(grist.docApi));
  
grist.onRecord(function(record) {
  if (!record) return;
  currentRecord = record;
  tableId = grist.getSelectedTableIdSync(); // ✅ correct method
  
  let lat = record.Latitude;
  let lon = record.Longitude;
  if (lat && lon) {
    if (marker) {
      marker.setLatLng([lat, lon]);
    } else {
      marker = createMarker(lat, lon);
    }
    map.setView([lat, lon], 12);
  }
});

  function createMarker(lat, lon) {
    let m = L.marker([lat, lon], { draggable: true }).addTo(map);
    m.on('dragend', function(e) {
      let pos = e.target.getLatLng();
      updateGrist(pos.lat, pos.lng);
    });
    return m;
  }

  map.on('click', function(e) {
    let lat = e.latlng.lat;
    let lon = e.latlng.lng;
    if (marker) {
      marker.setLatLng([lat, lon]);
    } else {
      marker = createMarker(lat, lon);
    }
    updateGrist(lat, lon);
  });

function updateGrist(lat, lon) {
  if (!currentRecord || !tableId) return;
  console.log("Updating record", currentRecord.id, "in table", tableId, "with", lat, lon);
  grist.docApi.applyUserActions([
    ["UpdateRecord", tableId, currentRecord.id, {
      Latitude: Number(lat),
      Longitude: Number(lon)
    }]
  ]);
}
</script>
</body>
</html>
