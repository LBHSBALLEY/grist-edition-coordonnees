<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Map Editor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
<div id="map"></div>
<script>
  let map = L.map('map').setView([48.85, 2.35], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  let marker = null;
  let currentRecord = null;
  let tableId = null;
  let hasCoords = false;

  grist.ready({
    requiredAccess: 'full',
    columns: [
      { name: 'Latitude',  type: 'Numeric', optional: true },
      { name: 'Longitude', type: 'Numeric', optional: true },
      { name: 'Geometry',     type: 'Text',    optional: true,
        description: 'Format WKT: POINT (lon lat)' },
    ]
  });

  grist.onRecord(function(record) {
    if (!record) return;
    currentRecord = record;
    tableId = grist.getSelectedTableIdSync();

    let lat, lon;

    if (record.Geometry) {
      // Parse WKT format: POINT (lon lat)
      const match = record.Geometry.match(/POINT\s*\(\s*([-\d.]+)\s+([-\d.]+)\s*\)/i);
      if (match) {
        lon = parseFloat(match[1]);
        lat = parseFloat(match[2]);
      }
    } else {
      lat = record.Latitude;
      lon = record.Longitude;
    }

    if (lat && lon) {
      hasCoords = true;
      if (marker) {
        marker.setLatLng([lat, lon]);
      } else {
        marker = createMarker(lat, lon);
      }
      map.setView([lat, lon], 15);
    } else {
      hasCoords = false;
      if (marker) {
        map.removeLayer(marker);
        marker = null;
      }
    }
  });

  function createMarker(lat, lon) {
    let m = L.marker([lat, lon], { draggable: true }).addTo(map);
    m.on('dragend', function(e) {
      let pos = e.target.getLatLng();
      updateGrist(pos.lat, pos.lng);
    });
    return m;
  }

  // Click only creates coords if the record has none yet
  map.on('click', function(e) {
    if (hasCoords) return;

    let lat = e.latlng.lat;
    let lon = e.latlng.lng;
    marker = createMarker(lat, lon);
    hasCoords = true;
    updateGrist(lat, lon);
  });

  function updateGrist(lat, lon) {
    if (!currentRecord || !tableId) return;

    const fields = {};

    if (currentRecord.Geometry !== undefined) {
      fields.Geometry = `POINT (${lon} ${lat})`;
    }
    if (currentRecord.Latitude !== undefined) {
      fields.Latitude = Number(lat);
    }
    if (currentRecord.Longitude !== undefined) {
      fields.Longitude = Number(lon);
    }

    grist.docApi.applyUserActions([
      ["UpdateRecord", tableId, currentRecord.id, fields]
    ]);
  }
</script>
</body>
</html>
