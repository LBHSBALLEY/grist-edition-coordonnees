<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Map Editor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
<div id="map"></div>

<script>
let map = L.map('map').setView([48.85, 2.35], 5); // centre France

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let marker = null;

let currentRecordId = null;

grist.onRecord(function(record) {
  if (!record) return;

  currentRecordId = record.id;

  let lat = record.Latitude;
  let lon = record.Longitude;

  if (lat && lon) {
    if (marker) {
      marker.setLatLng([lat, lon]);
    } else {
      marker = createMarker(lat, lon);
    }
    map.setView([lat, lon], 12);
  }
});
  
// Lire les données de Grist
grist.ready();


// Créer un marker draggable
function createMarker(lat, lon) {
  let m = L.marker([lat, lon], {draggable: true}).addTo(map);

  m.on('dragend', function(e) {
    let pos = e.target.getLatLng();
    updateGrist(pos.lat, pos.lng);
  });

  return m;
}

// Clic sur la carte
map.on('click', function(e) {
  let lat = e.latlng.lat;
  let lon = e.latlng.lng;

  if (marker) {
    marker.setLatLng([lat, lon]);
  } else {
    marker = createMarker(lat, lon);
  }
  console.log(grist.selectedRecord);
  console.log("new lat : " + lat);
  console.log("new lon : " + lon);
  updateGrist(lat, lon);
});

// Mettre à jour Grist
function updateGrist(lat, lon) {
  if (!currentRecordId) {
    console.warn("Aucune ligne sélectionnée");
    return;
  }

  grist.docApi.applyUserActions([
    ["UpdateRecord", grist.selectedTable.getTableId(), currentRecordId, {
      Latitude: Number(lat),
      Longitude: Number(lon)
    }]
  ]);
} 
</script>
</body>
</html>
